name: iOS

on:
  push:
    branches: [main, develop]
    paths:
      - "ios/**"
      - ".github/workflows/ios.yml"
  pull_request:
    branches: [main]
    paths:
      - "ios/**"
      - ".github/workflows/ios.yml"

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test (iOS Simulator)
    runs-on: macos-14
    timeout-minutes: 25

    env:
      XCODE_VERSION: "15.4"
      SCHEME: Marianni
      DESTINATION: "platform=iOS Simulator,name=iPhone 15,OS=17.5"

    defaults:
      run:
        working-directory: ios

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode ${{ env.XCODE_VERSION }}
        run: sudo xcode-select -s "/Applications/Xcode_${XCODE_VERSION}.app"

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve packages
        run: xcodebuild -resolvePackageDependencies -project Marianni.xcodeproj -scheme "$SCHEME"

      - name: Build
        run: |
          set -o pipefail
          xcodebuild \
            -project Marianni.xcodeproj \
            -scheme "$SCHEME" \
            -destination "$DESTINATION" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build | tee build.log

      - name: Test
        run: |
          set -o pipefail
          xcodebuild \
            -project Marianni.xcodeproj \
            -scheme "$SCHEME" \
            -destination "$DESTINATION" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            test | tee test.log

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-logs
          path: |
            ios/build.log
            ios/test.log
          if-no-files-found: ignore
