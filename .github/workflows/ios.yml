name: iOS

on:
  push:
    branches: [main, develop]
    paths:
      - "ios/**"
      - ".github/workflows/ios.yml"
  pull_request:
    branches: [main]
    paths:
      - "ios/**"
      - ".github/workflows/ios.yml"

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test (iOS Simulator)
    runs-on: macos-15
    timeout-minutes: 35

    env:
      SCHEME: Marianni

    defaults:
      run:
        working-directory: ios

    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode available on the runner
        run: |
          set -euo pipefail
          # Pick the highest Xcode_*.app present in /Applications. Pinning a
          # specific Xcode version is brittle because the runner image ships
          # only certain iOS simulator runtimes — the latest Xcode is what
          # actually matches the preinstalled runtime.
          XCODE_APP=$(ls -d /Applications/Xcode_*.app 2>/dev/null \
            | sort -V \
            | tail -n 1)
          if [ -z "$XCODE_APP" ]; then
            echo "No Xcode_*.app found in /Applications" >&2
            ls /Applications >&2
            exit 1
          fi
          echo "Selecting $XCODE_APP"
          sudo xcode-select -s "$XCODE_APP/Contents/Developer"
        working-directory: .

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version
          xcrun simctl list runtimes

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Pick an available iOS simulator
        id: sim
        run: |
          set -euo pipefail
          xcrun simctl list devices available
          UDID=$(xcrun simctl list devices available -j \
            | python3 -c '
          import json, sys
          data = json.load(sys.stdin)
          # Prefer newest iOS runtime; pick first available iPhone.
          for runtime in sorted(data["devices"].keys(), reverse=True):
              if "iOS" not in runtime:
                  continue
              for dev in data["devices"][runtime]:
                  if dev.get("isAvailable") and "iPhone" in dev["name"]:
                      print(dev["udid"])
                      sys.exit(0)
          sys.exit(1)
          ')
          if [ -z "$UDID" ]; then
            echo "No iPhone simulator available — installing iOS platform" >&2
            xcodebuild -downloadPlatform iOS
            UDID=$(xcrun simctl list devices available -j \
              | python3 -c '
          import json, sys
          data = json.load(sys.stdin)
          for runtime in sorted(data["devices"].keys(), reverse=True):
              if "iOS" not in runtime:
                  continue
              for dev in data["devices"][runtime]:
                  if dev.get("isAvailable") and "iPhone" in dev["name"]:
                      print(dev["udid"])
                      sys.exit(0)
          sys.exit(1)
          ')
          fi
          echo "Selected simulator UDID: $UDID"
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"
        working-directory: .

      - name: Resolve packages
        run: xcodebuild -resolvePackageDependencies -project Marianni.xcodeproj -scheme "$SCHEME"

      - name: Build
        run: |
          set -o pipefail
          xcodebuild \
            -project Marianni.xcodeproj \
            -scheme "$SCHEME" \
            -destination "id=${{ steps.sim.outputs.udid }}" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build | tee build.log

      - name: Test
        run: |
          set -o pipefail
          xcodebuild \
            -project Marianni.xcodeproj \
            -scheme "$SCHEME" \
            -destination "id=${{ steps.sim.outputs.udid }}" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            test | tee test.log

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-logs
          path: |
            ios/build.log
            ios/test.log
          if-no-files-found: ignore
