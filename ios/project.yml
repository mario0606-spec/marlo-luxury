name: Marianni
options:
  bundleIdPrefix: com.marianni
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO
    GCC_TREAT_WARNINGS_AS_ERRORS: NO
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGNING_ALLOWED: NO

targets:
  Marianni:
    type: application
    platform: iOS
    sources:
      - path: Marianni
        excludes:
          - "DesignSystem/Fonts/FONTS.md"
    info:
      path: Marianni/App/Info.plist
      properties:
        CFBundleDisplayName: Marianni
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: AccentColor
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        CFBundleLocalizations:
          - en
          - de
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.marianni.app
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: NO

  MarianniTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/Unit
    dependencies:
      - target: Marianni
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.marianni.app.tests
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Marianni.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Marianni"

schemes:
  Marianni:
    build:
      targets:
        Marianni: all
        MarianniTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - MarianniTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
